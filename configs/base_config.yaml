model:
  encoder_type: vit_small
  patch_size: 16
  embed_dim: 384
  depth: 12
  num_heads: 6
  masking_ratio: 0.75

decoder:
  type: transformer
  decoder_depth: 2
  decoder_embed_dim: 512

training:
  epochs: 200
  batch_size: 128
  lr: 1.5e-4
  warmup_epochs: 40
  weight_decay: 0.05
  device: cuda
  mixed_precision: true
  seed: 42

data:
  dataset: esc50
  data_root: data/
  num_workers: 4

logging:
  use_wandb: false
  save_every: 20
  output_dir: results/
